@if (authService.isAuthenticated()) {
  <nav class="top-nav">
    <a class="nav-logo" routerLink="/lobby"><span class="logo-g">g</span><span class="logo-accent">Chess</span></a>
    <div class="nav-links">
      <a routerLink="/lobby" routerLinkActive="active">PLAY</a>
      <a routerLink="/history" routerLinkActive="active">WATCH</a>
    </div>
    <div class="nav-profile">
      <button mat-button [matMenuTriggerFor]="profileMenu" class="profile-btn">
        <span class="online-pulse"></span>
        <span class="profile-username">{{ authService.currentUser()?.username }}</span>
        <mat-icon>keyboard_arrow_down</mat-icon>
      </button>
      <mat-menu #profileMenu="matMenu">
        <button mat-menu-item (click)="authService.logout()">
          <mat-icon>logout</mat-icon> DISCONNECT
        </button>
      </mat-menu>
    </div>
  </nav>
}
<main class="app-main" [class.authenticated]="authService.isAuthenticated()">
  <router-outlet />
</main>
