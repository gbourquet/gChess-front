@if (authService.isAuthenticated()) {
  <nav class="top-nav">
    <a class="nav-logo" routerLink="/dashboard"><span class="logo-g">g</span><span class="logo-accent">Chess</span></a>
    <div class="nav-links">
      <a routerLink="/lobby" routerLinkActive="active">PLAY</a>
      <a routerLink="/history" routerLinkActive="active">WATCH</a>
    </div>
    <div class="nav-profile">
      <button mat-button [matMenuTriggerFor]="profileMenu" class="profile-btn">
        <span class="online-pulse"></span>
        <span class="profile-username">{{ authService.currentUser()?.username }}</span>
        <mat-icon>keyboard_arrow_down</mat-icon>
      </button>
      <mat-menu #profileMenu="matMenu">
        <button mat-menu-item (click)="authService.logout()">
          <mat-icon>logout</mat-icon> DISCONNECT
        </button>
      </mat-menu>
    </div>
  </nav>
}
<main class="app-main" [class.authenticated]="authService.isAuthenticated()">
  <router-outlet />
</main>
@if (authService.isAuthenticated()) {
  <footer class="bottom-bar">
    <div class="bottom-controls">
      <button class="bar-btn" title="Son"><mat-icon>volume_up</mat-icon></button>
      <span class="bar-sep">|</span>
      <span class="bar-label">PIECES</span>
      <button class="bar-btn active-opt">WIREFRAME</button>
      <button class="bar-btn">CLASSIC</button>
      <span class="bar-sep">|</span>
      <span class="bar-label">BOARD</span>
      <button class="bar-btn active-opt">NEON</button>
      <button class="bar-btn">METAL</button>
      <span class="bar-sep">|</span>
      <button class="bar-btn" title="Color-blind"><mat-icon>visibility</mat-icon></button>
    </div>
  </footer>
}
