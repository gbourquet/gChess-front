<mat-card class="game-status-card">
  <mat-card-content>
    <div class="status-container">
      <!-- Turn indicator - only show when game is not over -->
      @if (!isGameOver()) {
        <div class="turn-indicator">
          <mat-icon [class.white-turn]="currentSide() === 'WHITE'" [class.black-turn]="currentSide() === 'BLACK'">
            {{ currentSide() === 'WHITE' ? 'radio_button_unchecked' : 'circle' }}
          </mat-icon>
          <span class="turn-text">{{ turnLabel() }}</span>
        </div>
      }

      <!-- Status chip -->
      <mat-chip-set aria-label="Game status">
        <mat-chip [color]="statusColor()" highlighted>
          <mat-icon matChipAvatar>{{ statusIcon() }}</mat-icon>
          {{ statusLabel() }}
        </mat-chip>
      </mat-chip-set>

      <!-- Game over message -->
      @if (isGameOver()) {
        <div class="game-over-message">
          <mat-icon>sports_esports</mat-icon>
          <span>Partie terminée</span>
        </div>
      }
    </div>
  </mat-card-content>
</mat-card>
